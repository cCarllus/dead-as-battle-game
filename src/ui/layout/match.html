<!-- Responsável por estruturar a tela de partida global em viewport full-game com HUD completo e menu de pausa. -->
<section class="dab-match" data-screen="match">
  <div class="dab-match__viewport">
    <canvas class="dab-match__canvas" data-slot="match-canvas" aria-label="Cena 3D da partida global"></canvas>

    <section class="dab-match__loading" data-slot="match-loading" role="status" aria-live="polite">
      <h2 class="dab-match__loading-title" data-slot="match-loading-title">Global Match</h2>
      <p class="dab-match__loading-text" data-slot="match-loading-text">Conectando com o servidor...</p>
    </section>

    <section class="dab-match__hud-layer" aria-hidden="true">
      <header class="dab-match__hud-top">
        <aside class="dab-match__presence-card">
          <h2 data-slot="match-title">Global Match</h2>
          <p data-slot="match-player-count">Jogadores conectados: 0</p>
          <ul class="dab-match__player-list" data-slot="match-player-list"></ul>
        </aside>

        <section class="dab-match__stats-pill">
          <div class="dab-match__stat-item">
            <span class="dab-match__stat-label">Tempo</span>
            <strong class="dab-match__stat-value" data-slot="match-hud-timer">00:00</strong>
          </div>
          <span class="dab-match__stat-divider" aria-hidden="true"></span>
          <div class="dab-match__stat-item">
            <span class="dab-match__stat-label">Kills</span>
            <strong class="dab-match__stat-value is-kills" data-slot="match-hud-kills">0</strong>
          </div>
          <span class="dab-match__stat-divider" aria-hidden="true"></span>
          <div class="dab-match__stat-item">
            <span class="dab-match__stat-label">Deaths</span>
            <strong class="dab-match__stat-value is-deaths" data-slot="match-hud-deaths">0</strong>
          </div>
        </section>

        <aside class="dab-match__meta-card">
          <div class="dab-match__meta-row">
            <span class="dab-match__meta-label is-coins">Coins</span>
            <strong class="dab-match__meta-value" data-slot="match-hud-coins">0</strong>
          </div>
          <div class="dab-match__meta-separator"></div>
          <div class="dab-match__meta-row">
            <span class="dab-match__meta-label">Ping</span>
            <strong class="dab-match__meta-value is-ping" data-slot="match-hud-ping">--ms</strong>
          </div>
        </aside>
      </header>

      <div class="dab-match__hud-center">
        <div class="dab-match__crosshair" data-slot="match-crosshair" aria-hidden="true">
          <span class="dab-match__crosshair-line is-horizontal"></span>
          <span class="dab-match__crosshair-line is-vertical"></span>
        </div>
      </div>

      <footer class="dab-match__hud-bottom">
        <section class="dab-match__vitals">
          <div class="dab-match__vitals-cluster" aria-hidden="true">
            <div class="dab-match__vitals-core">
              <span class="dab-match__vitals-core-icon">X</span>
            </div>
            <div class="dab-match__vitals-gem is-left">
              <span class="dab-match__vitals-gem-icon">W</span>
            </div>
            <div class="dab-match__vitals-gem is-top">
              <span class="dab-match__vitals-gem-icon">S</span>
            </div>
            <div class="dab-match__vitals-gem is-bottom">
              <span class="dab-match__vitals-gem-icon">Z</span>
            </div>
            <div class="dab-match__vitals-connector"></div>
          </div>

          <div class="dab-match__vitals-bars-wrap">
            <div class="dab-match__vitals-bars">
              <div class="dab-match__bar is-health">
                <span class="dab-match__bar-fill" data-slot="match-hud-health-fill"></span>
              </div>
              <div class="dab-match__bar is-resource">
                <span class="dab-match__bar-fill" data-slot="match-hud-resource-fill"></span>
              </div>
            </div>
          </div>
        </section>

        <section class="dab-match__skills">
          <div class="dab-match__skill">
            <span class="dab-match__skill-icon">1</span>
          </div>
          <div class="dab-match__skill is-disabled">
            <span class="dab-match__skill-icon">2</span>
          </div>
          <div class="dab-match__skill is-ultimate">
            <span class="dab-match__skill-icon">Q</span>
          </div>
          <button
            type="button"
            class="dab-match__skill is-fly"
            data-action="toggle-fly"
            data-slot="match-fly-toggle"
            aria-pressed="false"
            title="Fly (F)"
          >
            <span class="dab-match__skill-icon" aria-hidden="true">&#9992;</span>
            <small class="dab-match__skill-key">F</small>
          </button>
        </section>
      </footer>

      <small class="dab-match__pointer-hint" data-slot="match-pointer-lock-hint">
        Clique no jogo para capturar o mouse
      </small>
    </section>

    <div class="dab-match-menu" data-slot="match-menu" aria-hidden="true" hidden>
      <button type="button" class="dab-match-menu__overlay" data-action="match-menu-close" aria-label="Fechar menu"></button>

      <section class="dab-match-menu__panel" role="dialog" aria-modal="true" aria-labelledby="dab-match-menu-title">
        <h2 id="dab-match-menu-title" data-slot="match-menu-title">Game Menu</h2>

        <div class="dab-match-menu__actions">
          <button type="button" class="dab-settings-danger__button" data-action="leave-match" data-slot="match-menu-exit">
            Exit Match
          </button>
          <button type="button" class="dab-settings-primary" data-action="open-settings" data-slot="match-menu-settings">
            Settings
          </button>
        </div>
      </section>
    </div>

    <div class="dab-settings-modal" data-slot="settings-modal" aria-hidden="true" hidden>
      <button
        type="button"
        class="dab-settings-modal__overlay"
        data-settings-action="overlay-close"
        data-i18n-aria-label="settings.close.aria"
      ></button>

      <section
        class="dab-settings-panel"
        data-slot="settings-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dab-settings-title"
        aria-describedby="dab-settings-subtitle"
      >
        <header class="dab-settings-panel__header">
          <h2 id="dab-settings-title" data-i18n="settings.modal.title"></h2>
          <p id="dab-settings-subtitle" data-i18n="settings.modal.subtitle"></p>
        </header>

        <div class="dab-settings-panel__body">
          <section class="dab-settings-section">
            <h3 data-i18n="settings.section.video"></h3>

            <label class="dab-settings-control" data-setting-field="fullscreen">
              <span class="dab-settings-control__copy">
                <strong data-i18n="settings.fullscreen.label"></strong>
                <small data-i18n="settings.fullscreen.description"></small>
                <small data-slot="settings-fullscreen-unsupported" data-i18n="settings.fullscreen.unsupported" hidden></small>
              </span>
              <span class="dab-settings-switch">
                <input type="checkbox" data-setting-toggle="fullscreen" />
                <span class="dab-settings-switch__track"></span>
              </span>
            </label>

            <label class="dab-settings-control">
              <span class="dab-settings-control__copy">
                <strong data-i18n="settings.language.label"></strong>
                <small data-i18n="settings.language.description"></small>
              </span>
              <span class="dab-settings-select">
                <select data-setting-select="locale">
                  <option value="pt-BR" data-i18n="settings.language.option.ptBR"></option>
                  <option value="en-US" data-i18n="settings.language.option.enUS"></option>
                </select>
              </span>
            </label>
          </section>

          <section class="dab-settings-section">
            <h3 data-i18n="settings.section.audio"></h3>

            <label class="dab-settings-control">
              <span class="dab-settings-control__copy">
                <strong data-i18n="settings.audio.muteAll.label"></strong>
                <small data-i18n="settings.audio.muteAll.description"></small>
              </span>
              <span class="dab-settings-switch">
                <input type="checkbox" data-setting-toggle="muteAll" />
                <span class="dab-settings-switch__track"></span>
              </span>
            </label>

            <div class="dab-settings-control dab-settings-control--column" data-setting-field="masterVolume">
              <div class="dab-settings-slider-header">
                <span class="dab-settings-control__copy">
                  <strong data-i18n="settings.audio.masterVolume.label"></strong>
                </span>
                <strong data-setting-value="masterVolume">80%</strong>
              </div>
              <input type="range" min="0" max="100" value="80" data-setting-slider="masterVolume" />
            </div>
          </section>

          <section class="dab-settings-section">
            <h3 data-i18n="settings.section.account"></h3>

            <div class="dab-settings-danger">
              <button type="button" class="dab-settings-danger__button" data-settings-action="logout" data-i18n="settings.account.logout"></button>
              <small data-i18n="settings.account.logout.helper"></small>
            </div>
          </section>
        </div>

        <footer class="dab-settings-panel__footer">
          <button type="button" class="dab-settings-ghost" data-settings-action="restore" data-i18n="settings.restore"></button>
          <div class="dab-settings-actions">
            <button type="button" class="dab-settings-secondary" data-settings-action="cancel" data-i18n="settings.cancel"></button>
            <button type="button" class="dab-settings-primary" data-settings-action="save" data-i18n="settings.save"></button>
          </div>
        </footer>
      </section>
    </div>

    <div class="dab-toast" data-slot="settings-toast" role="status" aria-live="polite"></div>
  </div>
</section>
