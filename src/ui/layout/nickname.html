<!-- Responsável por estruturar a tela de entrada e validação de nickname. -->
<section class="nickname-screen" data-screen="nickname">
  <div class="nickname-screen__bg" aria-hidden="true">
    <div class="nickname-screen__bg-gradient"></div>
    <div class="nickname-screen__blob nickname-screen__blob--left"></div>
    <div class="nickname-screen__blob nickname-screen__blob--right"></div>
  </div>

  <div class="nickname-screen__content">
    <h1 class="nickname-screen__title" data-i18n="intro.title"></h1>

    <div class="nickname-screen__form">
      <input
        id="nickname-input"
        class="nickname-screen__input"
        type="text"
        maxlength="16"
        autocomplete="nickname"
        spellcheck="false"
        data-slot="nickname-input"
      />
      <button type="button" class="nickname-screen__submit" data-action="submit" data-i18n="nick.submit"></button>
      <p class="nickname-screen__error" data-slot="error"></p>
    </div>

    <section class="nickname-screen__import">
      <button type="button" class="nickname-screen__import-trigger" data-action="choose-import" data-i18n="nick.import.trigger"></button>
      <input
        class="nickname-screen__file-input"
        type="file"
        accept="application/json,.json"
        data-slot="import-file-input"
        hidden
      />
      <p class="nickname-screen__import-feedback" data-slot="import-feedback"></p>
      <div class="nickname-screen__import-preview" data-slot="import-preview" hidden>
        <strong class="nickname-screen__import-title" data-i18n="nick.import.preview.title"></strong>
        <p data-slot="import-preview-name"></p>
        <p data-slot="import-preview-meta"></p>
        <p class="nickname-screen__import-warning" data-slot="import-preview-warning"></p>
        <button type="button" class="nickname-screen__import-confirm" data-action="confirm-import" data-i18n="nick.import.confirm"></button>
      </div>
    </section>

    <p class="nickname-screen__helper">Seu nickname fica salvo neste dispositivo.</p>
  </div>
</section>
