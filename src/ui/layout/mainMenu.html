<section class="dab-menu" data-screen="main-menu">
  <div class="dab-menu__bg" data-parallax="bg"></div>
  <div class="dab-menu__aurora dab-menu__aurora--left"></div>
  <div class="dab-menu__aurora dab-menu__aurora--right"></div>

  <header class="dab-menu__header">
    <div class="dab-logo">
      <span class="dab-logo__mark" aria-hidden="true"></span>
      <span class="dab-logo__text" data-i18n="menu.logo"></span>
    </div>

    <nav class="dab-menu__nav" data-slot="nav"></nav>

    <div class="dab-menu__tools">
      <div class="dab-currency" data-slot="currency"></div>
    </div>
  </header>

  <div class="dab-menu__watermark" aria-hidden="true">
    <h1 data-i18n="menu.watermark.title"></h1>
    <p data-i18n="menu.watermark.subtitle"></p>
  </div>

  <div class="dab-menu__champion" data-parallax="champion" aria-hidden="true">
    <div class="dab-menu__champion-core"></div>
  </div>

  <main class="dab-menu__main">
    <aside class="dab-roster">
      <div class="dab-roster__title">
        <h2 data-i18n="menu.roster.title"></h2>
        <span data-slot="roster-count"></span>
      </div>
      <div data-slot="team-slots"></div>
    </aside>

    <section class="dab-play">
      <article class="dab-play__card">
        <div class="dab-play__mode">
          <h3 data-i18n="menu.play.quickMatch"></h3>
        </div>
        <button type="button" class="dab-play__start" data-action="play" data-i18n="menu.play.start"></button>
      </article>

      <div class="dab-play__status" data-slot="ping"></div>
    </section>
  </main>

  <footer class="dab-menu__footer">
    <button type="button" class="dab-chat-button" data-i18n="menu.footer.chat"></button>
    <div class="dab-footer-actions" data-slot="footer-actions"></div>
  </footer>
</section>
