services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "24.11.0"
        NPM_VERSION: "11.6.1"
    container_name: dead-as-battleground-dev
    working_dir: /app
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 2567
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
      - "2567:2567"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - npm_cache:/root/.npm
    command:
      - sh
      - -c
      - |
        npm ci
        npm exec concurrently -- -k -n SERVER,WEB -c cyan,yellow "npm run dev:server" "npm run dev:ngrok -- --host 0.0.0.0 --port 5173"

volumes:
  node_modules:
  npm_cache:
